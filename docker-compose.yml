services:
  postgres:
    image: postgres:16
    container_name: propai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: propai
      POSTGRES_PASSWORD: propai
      POSTGRES_DB: propai
    ports:
      - "5433:5432"
    volumes:
      - propai_pgdata:/var/lib/postgresql/data

volumes:
  propai_pgdata:
